apiVersion: v1
kind: Service

metadata:
  name: nginx
  namespace: nginx   # good practice to mention namespace

spec:
  type: NodePort     # Service type defined here

  selector:
    app: nginx       # Must match pod label

  ports:
    - protocol: TCP
      port: 80           # Service port
      targetPort: 80     # Container port
      nodePort: 30007    # Optional (if not given, auto-assigned)