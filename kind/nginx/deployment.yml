apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-deployment
  namespace: nginx

spec:
  replicas: 2 #how many repicas should be have

  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx

    spec:
      containers:
        - name: nginx
          image: nginx:latest   
          
          ports:
            - containerPort: 80

          # Mount the PVC inside container
          volumeMounts:
            - name: nginx-pvc-data   # Must match volume name
              mountPath: /var/www/html

      # Volumes must be inside pod spec
      volumes:
        - name: nginx-pvc-data
          persistentVolumeClaim:
            claimName: nginx-pvc

