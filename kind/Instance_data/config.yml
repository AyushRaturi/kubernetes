kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

nodes:
  - role: control-plane
    image: kindest/node:v1.31.2
    extraPortMappings:
    - containerPort: 80
      hostPort: 30080
      listenAddress: "0.0.0.0"
      protocol: tcp
    - containerPort: 443
      hostPort: 30443
      listenAddress: "0.0.0.0"
      protocol: tcp
  - role: worker
    image: kindest/node:v1.31.2
  - role: worker
    image: kindest/node:v1.31.2

